<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告栏 | 枫盈苏州</title>
  <meta name="description" content="枫盈苏州公告栏，集中展示社区活动、景区运营更新与便民提醒。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="notice-board-page">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="返回枫盈苏州首页">
        <span class="brand-mark"><img src="images/log.jpg" alt=""></span>
        <span class="brand-copy">
          <strong>枫盈苏州</strong>
          <span>苏州枫桥文化导览</span>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="notice-board-nav">
        <span></span>
        <span></span>
        <span></span>
        <span class="sr-only">打开导航</span>
      </button>

      <nav class="site-nav" id="notice-board-nav" aria-label="全站导航">
        <a href="index.html#top">首页</a>
        <a href="interactive-map.html">互动地图</a>
        <a href="photo-wall.html">照片墙</a>
        <a href="notice-board.html" aria-current="page">公告栏</a>
        <a href="smart-agent.html">智能枫桥</a>
      </nav>
    </header>

    <main class="notice-board-main">
      <section class="notice-hero">
        <div class="notice-hero-copy">
          <p class="eyebrow">Resident Notice Board</p>
          <h1>把社区更新、
            <span>景区运营与便民提醒，</span>
            放在一页清楚看完。
          </h1>
          <p class="hero-summary">
            这是一页面向居民与社区关注者的公告栏。它强调分类清楚、信息可信、阅读直接，帮助用户快速找到与日常生活、活动安排和运营更新相关的内容。
          </p>
        </div>

        <aside class="notice-hero-panel" aria-label="重要提醒">
          <section class="notice-hero-alert" aria-labelledby="notice-alert-title">
            <div class="notice-hero-alert-head">
              <p class="eyebrow">重要提醒</p>
              <h2 id="notice-alert-title">优先查看最新提醒</h2>
            </div>
            <div class="notice-hero-alert-list" id="notice-hero-alert-list" aria-live="polite"></div>
          </section>
        </aside>
      </section>

      <section class="notice-board-shell section" id="notice-board">
        <div class="notice-board-topbar">
          <div class="section-heading">
            <p class="eyebrow">公告列表</p>
            <h2>按类别查看社区活动、运营信息与便民提醒</h2>
            <p>内容按居民视角组织，方便快速查看社区活动、景区运营与便民提醒。</p>
          </div>

          <div class="notice-filter-bar" aria-label="公告分类筛选">
            <button class="notice-filter-chip is-active" type="button" data-category-filter="all">全部</button>
            <button class="notice-filter-chip" type="button" data-category-filter="community">社区活动</button>
            <button class="notice-filter-chip" type="button" data-category-filter="operations">景区运营</button>
            <button class="notice-filter-chip" type="button" data-category-filter="service">便民提醒</button>
          </div>
        </div>

        <div class="notice-columns" id="notice-columns"></div>
      </section>
    </main>
  </div>

  <div class="notice-modal" id="notice-modal" aria-hidden="true">
    <button class="notice-modal-backdrop" type="button" aria-label="关闭公告详情"></button>
    <section class="notice-sheet" role="dialog" aria-modal="true" aria-labelledby="notice-sheet-title">
      <header class="notice-sheet-header">
        <div>
          <p class="notice-sheet-kicker">公告详情</p>
          <h2 id="notice-sheet-title">查看完整内容</h2>
        </div>
        <button class="notice-sheet-close" type="button">关闭</button>
      </header>
      <div class="notice-sheet-body" id="notice-sheet-body"></div>
    </section>
  </div>

  <script src="script.js"></script>
  <script src="notice-board.js"></script>
</body>
</html>
